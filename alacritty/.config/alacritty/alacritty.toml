[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10
dynamic_padding = true
dimensions = { columns = 125, lines = 38 }

decorations = "Buttonless"

opacity = 0.6
blur = true

option_as_alt = "Both"

[font]
normal.family = "MesloLGS Nerd Font Mono"

# regular
size = 24

[selection]
save_to_clipboard = true

[scrolling]
history = 10000
multiplier = 3

[general]
live_config_reload = true
import = ["~/.config/alacritty/themes/coolnight.toml"]

# for video
# size = 35.0
